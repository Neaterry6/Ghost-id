<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Anon Chat - Secure Login</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-surface": "#220214",
              "on-primary": "#ffeff1",
              "on-tertiary-container": "#321786",
              "on-primary-container": "#4c0021",
              "surface-container-highest": "#ffd0e3",
              "primary-fixed-dim": "#ff5290",
              "secondary-container": "#ffc0db",
              "primary-fixed": "#ff709e",
              "on-tertiary-fixed": "#180058",
              "background": "#fff4f6",
              "error": "#b31b25",
              "primary-container": "#ff709e",
              "on-secondary-fixed": "#670843",
              "tertiary-fixed": "#b4a4ff",
              "on-secondary": "#ffeff3",
              "on-secondary-container": "#802157",
              "secondary": "#99366c",
              "tertiary": "#5e4ab3",
              "on-background": "#4a2135",
              "surface-container-high": "#ffd8e7",
              "on-surface": "#4a2135",
              "secondary-dim": "#8a2a60",
              "surface-bright": "#fff4f6",
              "on-surface-variant": "#7d4d63",
              "surface-variant": "#ffd0e3",
              "tertiary-container": "#b4a4ff",
              "inverse-primary": "#ff4a8d",
              "outline-variant": "#d79db6",
              "on-secondary-fixed-variant": "#8c2b61",
              "secondary-fixed": "#ffc0db",
              "inverse-on-surface": "#c58da5",
              "on-primary-fixed-variant": "#5d002a",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#000000",
              "outline": "#9b687f",
              "tertiary-fixed-dim": "#a794ff",
              "primary": "#b50058",
              "surface": "#fff4f6",
              "error-dim": "#9f0519",
              "secondary-fixed-dim": "#ffabd1",
              "error-container": "#fb5151",
              "primary-dim": "#9f004d",
              "surface-container-low": "#ffecf2",
              "on-error": "#ffefee",
              "tertiary-dim": "#523da6",
              "surface-tint": "#b50058",
              "surface-container": "#ffe0eb",
              "on-error-container": "#570008",
              "on-tertiary": "#f6f0ff",
              "surface-dim": "#ffc4dd",
              "on-tertiary-fixed-variant": "#3b238f"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .neon-glow {
        box-shadow: 0 0 40px rgba(181, 0, 88, 0.1);
      }
      .glass-card {
        background: rgba(255, 244, 246, 0.8);
        backdrop-filter: blur(20px);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col overflow-x-hidden">
<!-- Header / TopAppBar Section -->
<header class="bg-[#fff4f6] dark:bg-[#1a0b12] fixed top-0 z-50 flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#b50058] dark:text-[#ff709e]" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-2xl font-black text-[#b50058] dark:text-[#ff709e] tracking-tighter">Anon Chat</span>
</div>
<button class="p-2 rounded-full hover:bg-[#ffd0e3]/50 dark:hover:bg-[#4a2135]/50 transition-colors active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-[#b50058] dark:text-[#ff709e]">light_mode</span>
</button>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12 relative">
<!-- Abstract Background Orbs -->
<div class="absolute top-1/4 -left-20 w-80 h-80 bg-primary-container/20 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 -right-20 w-96 h-96 bg-tertiary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-md z-10">
<!-- Hero / Branding Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center p-6 bg-surface-container rounded-xl neon-glow mb-6 relative">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">shield_person</span>
<div class="absolute -top-2 -right-2 w-6 h-6 bg-tertiary rounded-full animate-pulse"></div>
</div>
<h1 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight mb-2">Welcome Back</h1>
<p class="text-on-surface-variant font-medium opacity-80">Enter your alias to re-join the pulse.</p>
</div>
<!-- Login Form Card -->
<div class="glass-card p-8 rounded-lg shadow-none ring-1 ring-outline-variant/15 flex flex-col gap-6">
<!-- Input Group: Alias -->
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface px-1">ALIAS</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline-variant transition-all font-medium" placeholder="your_secret_tag" type="text"/>
</div>
</div>
<!-- Input Group: Secret Key -->
<div class="space-y-2">
<label class="font-label text-sm font-bold text-on-surface px-1">SECRET KEY</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">key</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-md focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline-variant transition-all font-medium" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg rounded-full shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Enter Sanctuary
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
<!-- Security Accents -->
<div class="flex items-center justify-center gap-2 py-2">
<span class="material-symbols-outlined text-tertiary text-sm" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest text-tertiary opacity-80">End-to-End Encrypted Pulse</span>
</div>
</div>
<!-- Secondary Actions -->
<div class="mt-8 flex flex-col items-center gap-4">
<a class="font-headline font-bold text-primary hover:text-primary-dim transition-colors flex items-center gap-1 group" href="#">
                    Create Identity
                    <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">add_circle</span>
</a>
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
<p class="text-on-surface-variant font-medium text-sm">Lost your secret key?</p>
<button class="text-xs font-bold uppercase tracking-tighter text-outline-variant hover:text-on-surface transition-colors">Wipe Local Instance</button>
</div>
</div>
</main>
<!-- Visual Polish: Floating Bubbles -->
<div class="fixed bottom-12 -left-8 pointer-events-none opacity-50">
<div class="w-24 h-24 rounded-xl bg-surface-container-highest rotate-12 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container">chat_bubble</span>
</div>
</div>
<div class="fixed top-32 -right-8 pointer-events-none opacity-50">
<div class="w-32 h-32 rounded-full bg-surface-container-high -rotate-12 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary opacity-20 text-5xl">fingerprint</span>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
<div class="absolute w-[200%] h-[200%] top-[-50%] left-[-50%] bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-surface-container-low via-surface to-surface opacity-40"></div>
</div>
</body></html>
